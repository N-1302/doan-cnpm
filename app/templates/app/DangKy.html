{% extends 'app/base.html' %}
{% load static %}
{% block main_content %}

<link rel="stylesheet" href="{% static 'app/css/DangKy.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<section class="dk-page">
    <div class="dk-wrapper">
        <div class="dk-card">
            <h2 class="dk-title">Đăng ký</h2>

            {% if loi %}
                <div class="dk-alert dk-error">{{ loi }}</div>
            {% endif %}

            {% if thanhcong %}
                <div class="dk-alert dk-success">{{ thanhcong }}</div>
            {% endif %}

            <form method="POST" class="dk-form" id="dangKyForm">
                {% csrf_token %}

                <div class="dk-group">
                    <label for="ho_ten">Họ và tên</label>
                    <input type="text" id="ho_ten" name="ho_ten" placeholder="Nhập họ và tên" required>
                </div>

                <div class="dk-group">
                    <label for="username">Tài khoản</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tài khoản" required>
                </div>

                <div class="dk-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email" required>
                </div>

                <div class="dk-group">
                    <label for="sdt">Số điện thoại</label>
                    <input type="text" id="sdt" name="sdt" placeholder="Nhập số điện thoại">
                </div>

                <div class="dk-group">
                    <label for="gioi_tinh">Giới tính</label>
                    <select id="gioi_tinh" name="gioi_tinh">
                        <option value="">-- Chọn giới tính --</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>

                <div class="dk-group">
                    <label for="password">Mật khẩu</label>
                    <div class="dk-password-box">
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        <button type="button" class="dk-toggle-password" data-target="password">
                            <i class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <div class="dk-group">
                    <label for="confirm_password">Xác nhận mật khẩu</label>
                    <div class="dk-password-box">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu" required>
                        <button type="button" class="dk-toggle-password" data-target="confirm_password">
                            <i class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="dk-submit-btn">Đăng ký</button>

                <p class="dk-login-text">
                    Đã có tài khoản
                    <a href="{% url 'login' %}">Đăng nhập ngay</a>
                </p>
            </form>
        </div>
    </div>
</section>

<script src="{% static 'app/js/DangKy.js' %}"></script>

{% endblock %}
