{% extends 'app/base.html' %} {% load static %} {% block main_content %}
<section class="py-5" style="background-color: #f7f3ea; min-height: 100vh">
  <div class="container">
    <div class="row d-flex justify-content-center align-items-center">
      <div class="col-lg-11 col-xl-10">
        <div class="card shadow-sm border-0" style="border-radius: 25px">
          <div class="card-body p-md-5">
            <div class="row justify-content-center align-items-center">
              <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                <p class="text-center h1 fw-bold mb-5 mt-4">Đăng nhập</p>

                {% if loi %}
                <p class="text-danger text-center fw-bold">{{ loi }}</p>
                {% endif %}

                <form method="POST" action="" class="mx-1 mx-md-4">
                  {% csrf_token %}

                  <div class="mb-3">
                    <label class="form-label" for="username"
                      >Tên đăng nhập</label
                    >
                    <input
                      type="text"
                      name="username"
                      id="username"
                      class="form-control"
                      placeholder="Nhập tên đăng nhập"
                      required
                    />
                  </div>

                  <div class="mb-3">
                    <label class="form-label" for="password">Mật khẩu</label>
                    <input
                      type="password"
                      name="password"
                      id="password"
                      class="form-control"
                      placeholder="Nhập mật khẩu"
                      required
                    />
                  </div>

                  <p class="text-center h6 fw-bold mb-4 mt-4">
                    Bạn chưa có tài khoản?
                    <a href="{% url 'register' %}">Đăng kí</a>
                  </p>

                  <div class="d-flex justify-content-center">
                    <button
                      type="submit"
                      class="btn btn-danger btn-lg px-5 rounded-pill"
                    >
                      Đăng nhập
                    </button>
                  </div>
                </form>
              </div>

              <div
                class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2"
              >
                <img
                  src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                  class="img-fluid"
                  alt="Sample image"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
