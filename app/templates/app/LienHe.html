{% extends 'app/base.html' %}
{% load static %}

{% block title %}Liên hệ{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'app/css/LienHe.css' %}">
{% endblock %}

{% block main_content %}
<section class="contact-page">
    <div class="container contact-layout">
        <div class="contact-left">
            <h1>Liên Hệ</h1>
            <div class="breadcrumb">
                <a href="{% url 'home' %}">TRANG CHỦ</a>
                <span>›</span>
                <span>LIÊN HỆ</span>
            </div>
        </div>

        <div class="contact-form-box">
            <h2>Gửi liên hệ đến cửa hàng</h2>

            <form method="POST" class="contact-form">
                {% csrf_token %}

                <div class="form-row">
                    <div class="form-group">
                        <label for="hoten">Họ và Tên <span>*</span></label>
                        <input type="text" id="hoten" name="HoTen" placeholder="Nhập họ và tên" required>
                    </div>

                    <div class="form-group">
                        <label for="sodienthoai">Số điện thoại</label>
                        <input type="text" id="sodienthoai" name="SoDienThoai" placeholder="Nhập số điện thoại">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email <span>*</span></label>
                    <input type="email" id="email" name="Email" placeholder="Nhập email" required>
                </div>

                <div class="form-group">
                    <label for="noidung">Nội dung chi tiết <span>*</span></label>
                    <textarea id="noidung" name="NoiDung" rows="5" placeholder="Nhập nội dung chi tiết" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Gửi thông tin</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
